<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florrie's Tracker v3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --pink:#FF6B9D;--pink2:#ff8fb5;--purple:#C084FC;
    --mint:#6EE7B7;--yellow:#FDE68A;--peach:#FDBA74;
    --bg:#FFF5F9;--surface:#FFFFFF;--text:#2D1B3D;
    --muted:#9B7FB6;--border:#F0D6E8;--done:#10B981;
    --radius:16px;--shadow:0 4px 20px rgba(192,132,252,0.15)
  }
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}



  header{background:linear-gradient(135deg,var(--pink) 0%,var(--purple) 100%);padding:16px 20px 0;box-shadow:0 4px 16px rgba(255,107,157,0.3);position:sticky;top:0;z-index:100}
  .header-inner{display:flex;flex-direction:column;align-items:center;gap:12px}
  .logo{font-family:'Pacifico',cursive;font-size:1.5rem;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.2)}
  nav{display:flex;gap:4px;background:rgba(255,255,255,0.2);border-radius:12px 12px 0 0;padding:4px}
  .nav-btn{flex:1;border:none;background:transparent;color:rgba(255,255,255,0.85);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.78rem;padding:8px 12px;border-radius:8px 8px 0 0;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .nav-btn.active{background:var(--bg);color:var(--pink)}
  .nav-btn:hover:not(.active){background:rgba(255,255,255,0.3)}
  main{flex:1;padding:20px 16px}
  .section-title{font-family:'Pacifico',cursive;font-size:1.2rem;color:var(--pink);margin-bottom:16px}
  .meal-selector{margin-bottom:16px}
  .meal-selector label{font-weight:700;font-size:0.85rem;color:var(--muted);display:block;margin-bottom:8px}
  .meal-btns{display:flex;gap:6px;flex-wrap:wrap}
  .meal-btn{border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.78rem;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all 0.2s}
  .meal-btn.active{background:var(--pink);border-color:var(--pink);color:white}
  .foods-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .food-card{border:2.5px solid var(--border);background:var(--surface);border-radius:14px;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.18s;position:relative}
  .food-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
  .food-card.selected{border-color:var(--pink);background:#FFF0F6;box-shadow:0 0 0 2px var(--pink2)}
  .food-card.reached{border-color:var(--done);background:#F0FDF4}
  .food-emoji{font-size:1.6rem;line-height:1}
  .food-label{font-size:0.62rem;font-weight:700;color:var(--text);text-align:center;line-height:1.2}
  .food-chip{font-size:0.58rem;font-weight:800;background:var(--border);color:var(--muted);padding:1px 5px;border-radius:8px}
  .chip-done{background:#D1FAE5;color:var(--done)}
  .star-badge{position:absolute;top:3px;right:3px;font-size:0.65rem}
  .custom-food-row{display:flex;gap:8px;margin-bottom:12px}
  .custom-food-row input{flex:1;border:2px solid var(--border);border-radius:10px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:0.85rem;background:var(--surface);color:var(--text);outline:none}
  .custom-food-row input:focus{border-color:var(--pink)}
  .selected-summary{background:#FFF0F6;border:1.5px solid var(--pink2);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:0.82rem;font-weight:600;color:var(--pink)}
  .log-notes-row textarea{width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:0.85rem;background:var(--surface);color:var(--text);outline:none;resize:none;margin-bottom:14px}
  .log-notes-row textarea:focus{border-color:var(--purple)}
  .pill-btn{border:none;background:var(--purple);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;padding:8px 14px;border-radius:20px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .pill-btn:hover{background:var(--pink);transform:translateY(-1px)}
  .big-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px rgba(255,107,157,0.4)}
  .big-btn:hover:not(:disabled){transform:translateY(-2px)}
  .big-btn:disabled{opacity:0.4;cursor:not-allowed}
  .back-btn{border:none;background:transparent;color:var(--pink);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;padding:4px 0;margin-bottom:16px;display:inline-block}
  .day-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
  .day-header{background:linear-gradient(90deg,var(--pink2),var(--purple));color:white;font-weight:800;font-size:0.9rem;padding:10px 16px}
  .meal-group{padding:10px 12px;border-bottom:1px solid var(--border)}
  .meal-group:last-child{border-bottom:none}
  .meal-group-label{font-size:0.78rem;font-weight:800;color:var(--muted);margin-bottom:6px}
  .log-items{display:flex;flex-direction:column;gap:6px}
  .log-item{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:8px 10px}
  .log-emoji{font-size:1.2rem;flex-shrink:0}
  .log-info{flex:1;min-width:0}
  .log-info strong{font-size:0.85rem;display:block}
  .log-note{font-size:0.75rem;color:var(--muted);display:block;margin-top:2px}
  .log-time{font-size:0.72rem;color:var(--muted);font-weight:700;white-space:nowrap;flex-shrink:0}
  .delete-btn{flex-shrink:0;border:none;background:#FEE2E2;color:#DC2626;font-size:0.75rem;font-weight:800;font-family:'Nunito',sans-serif;padding:4px 8px;border-radius:8px;cursor:pointer;transition:all 0.18s;white-space:nowrap}
  .delete-btn:hover{background:#DC2626;color:white}
  .edit-btn{flex-shrink:0;border:none;background:#EDE9FE;color:#7C3AED;font-size:0.9rem;width:28px;height:28px;border-radius:8px;cursor:pointer;transition:all 0.18s;padding:0;display:flex;align-items:center;justify-content:center;line-height:1}
  .edit-btn:hover{background:#7C3AED;color:white}
  .log-actions{display:flex;gap:4px;flex-shrink:0;align-items:center}
  .modal-overlay{position:fixed;inset:0;background:rgba(45,27,61,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  .modal h3{font-family:'Pacifico',cursive;color:var(--pink);margin-bottom:4px;font-size:1.1rem}
  .notes-modal-header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .notes-food-emoji{font-size:2.5rem;line-height:1}
  .notes-step{font-size:0.75rem;font-weight:700;color:var(--muted)}
  .modal label{font-size:0.82rem;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;margin-top:12px}
  .modal select,.modal textarea,.modal input{width:100%;border:2px solid var(--border);border-radius:10px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:0.88rem;background:var(--surface);color:var(--text);outline:none}
  .modal select:focus,.modal textarea:focus{border-color:var(--purple)}
  .modal-btns{display:flex;gap:8px;margin-top:20px}
  .modal-save{flex:1;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.9rem;cursor:pointer}
  .modal-cancel{padding:12px 16px;border:2px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer}
  .foods-group{margin-bottom:20px}
  .group-label{font-size:0.78rem;font-weight:800;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
  .food-row-btn{width:100%;display:flex;align-items:center;gap:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:all 0.2s;text-align:left}
  .food-row-btn:hover{border-color:var(--pink);transform:translateX(3px)}
  .food-row-emoji{font-size:1.4rem;flex-shrink:0}
  .food-row-info{flex:1}
  .food-row-label{font-size:0.88rem;font-weight:700;color:var(--text);display:block;margin-bottom:4px}
  .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .big-progress{height:12px;border-radius:6px;margin:12px 0}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:3px;transition:width 0.4s}
  .fill-done{background:linear-gradient(90deg,var(--mint),var(--done))}
  .food-row-count{font-size:0.78rem;font-weight:800;color:var(--muted);white-space:nowrap}
  .count-done{color:var(--done)}
  .export-btn{margin-top:8px;width:100%;text-align:center;padding:12px;border-radius:var(--radius);font-size:0.9rem}
  .food-hero{text-align:center;margin-bottom:16px}
  .hero-emoji{font-size:4rem;display:block;margin-bottom:8px}
  .food-hero h2{font-family:'Pacifico',cursive;color:var(--pink);font-size:1.6rem}
  .milestone-badge{display:inline-block;background:linear-gradient(135deg,var(--yellow),var(--peach));color:var(--text);font-weight:800;font-size:0.85rem;padding:4px 14px;border-radius:20px;margin-top:8px}
  .count-display{text-align:center;margin-bottom:8px}
  .count-number{font-family:'Pacifico',cursive;font-size:4rem;color:var(--pink);line-height:1}
  .count-number.count-done{color:var(--done)}
  .count-label{font-size:0.9rem;font-weight:700;color:var(--muted)}
  .count-sub{font-size:0.78rem;color:var(--muted)}
  .dot-track{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:12px 0 20px}
  .dot{width:24px;height:24px;border-radius:50%;background:var(--border)}
  .dot.dot-filled{background:linear-gradient(135deg,var(--pink),var(--purple));box-shadow:0 2px 6px rgba(255,107,157,0.4)}
  .log-history-title{font-weight:800;color:var(--muted);font-size:0.85rem;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
  .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:1rem;line-height:1.6}
  #toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.85rem;opacity:0;transform:translateY(10px);transition:all 0.3s;white-space:nowrap}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.toast-green{background:var(--done)}
  .toast.toast-red{background:#EF4444}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-inner">
      <span class="logo">🌸 Florrie's Tracker</span>
      <nav>
        <button class="nav-btn" data-v="log">Log Meal</button>
        <button class="nav-btn" data-v="history">History</button>
        <button class="nav-btn" data-v="food">Foods</button>
      </nav>
    </div>
  </header>
  <main id="content"></main>
  <div id="toast-container"></div>
</div>

<script>
// -- Firebase REST API config -------------------------------------------------
// No imports needed - talks to Firebase over plain fetch()
var DB = "https://florrie-s-tracker-default-rtdb.europe-west1.firebasedatabase.app";

// -- Foods --------------------------------------------------------------------
var FOODS = [
  {id:"avocado",      emoji:"🥑", label:"Avocado"},
  {id:"banana",       emoji:"🍌", label:"Banana"},
  {id:"apple",        emoji:"🍎", label:"Apple"},
  {id:"rice_cereal",  emoji:"🍚", label:"Rice Cereal"},
  {id:"sweet_potato", emoji:"🍠", label:"Sweet Potato"},
  {id:"oatmeal",      emoji:"🌾", label:"Oatmeal"},
  {id:"spinach",      emoji:"🥬", label:"Spinach"},
  {id:"chicken",      emoji:"🍗", label:"Chicken"},
  {id:"peas",         emoji:"🫛", label:"Peas"},
  {id:"pear",         emoji:"🍐", label:"Pear"},
  {id:"yogurt",       emoji:"🥛", label:"Yogurt"},
  {id:"carrot",       emoji:"🥕", label:"Carrot"},
  {id:"broccoli",     emoji:"🥦", label:"Broccoli"},
  {id:"prune",        emoji:"🟣", label:"Prune"},
  {id:"green_bean",   emoji:"🫘", label:"Green Bean"},
  {id:"mango",        emoji:"🥭", label:"Mango"},
  {id:"egg",          emoji:"🥚", label:"Egg"},
  {id:"strawberry",   emoji:"🍓", label:"Strawberry"},
  {id:"pasta",        emoji:"🍝", label:"Pasta"},
  {id:"blueberry",    emoji:"🫐", label:"Blueberry"}
];
var MILESTONE = 10;

// -- State --------------------------------------------------------------------
var allLogs      = [];
var view         = "log";
var selectedFoods = [];
var focusFood    = null;
var currentMeal  = "breakfast";
var pollInterval = null;

// -- Status bar ---------------------------------------------------------------
function setStatus(msg, type) { return; // disabled
  var bar = document.getElementById("status-bar");
  bar.textContent = msg;
  bar.className = type || "";
  bar.style.display = msg ? "block" : "none";
}

// -- Firebase REST helpers ----------------------------------------------------
function dbGet(path) {
  return fetch(DB + path + ".json")
    .then(function(r) { return r.json(); });
}
function dbPush(path, data) {
  return fetch(DB + path + ".json", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}
function dbDelete(path) {
  return fetch(DB + path + ".json", { method: "DELETE" });
}
function dbPatch(path, data) {
  return fetch(DB + path + ".json", {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

// -- Load + poll --------------------------------------------------------------
function loadLogs() {
  return dbGet("/logs").then(function(data) {
    allLogs = [];
    if (data && typeof data === "object") {
      Object.keys(data).forEach(function(key) {
        allLogs.push(Object.assign({_key: key}, data[key]));
      });
    }
    allLogs.sort(function(a,b){ return (b.timestamp||0)-(a.timestamp||0); });
    setStatus("✅ Connected - " + allLogs.length + " entries", "ok");
    return allLogs;
  }).catch(function(err) {
    setStatus("❌ " + err.message, "err");
    throw err;
  });
}

function startPolling() {
  // Show UI immediately - don't wait for DB on first load
  renderContent();
  // Then load data and re-render
  loadLogs().then(function() { renderContent(); }).catch(function() {
    // DB failed - still show UI so user isn't stuck on Loading
    renderContent();
  });
  pollInterval = setInterval(function() {
    loadLogs().then(function() {
      if (!window._notesFocused) renderContent();
    }).catch(function(){});
  }, 5000);
}

// -- Nav ----------------------------------------------------------------------
document.querySelectorAll(".nav-btn").forEach(function(b) {
  b.addEventListener("click", function() {
    view = b.dataset.v;
    focusFood = null;
    renderContent();
  });
});

// Boot
renderContent();
startPolling();

// -- Helpers ------------------------------------------------------------------
function foodCountMap() {
  var m = {};
  allLogs.forEach(function(l){ m[l.food] = (m[l.food]||0)+1; });
  return m;
}
function fmtDate(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}
function fmtTime(ts) {
  if (!ts) return "";
  return new Date(ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
function fmtDT(ts){ return fmtDate(ts)+" at "+fmtTime(ts); }
function mealLabel(m){
  return {breakfast:"🌅 Breakfast",lunch:"☀️ Lunch",dinner:"🌙 Dinner",snack:"🍪 Snack"}[m]||m;
}
function groupByDate(logs) {
  var g = {};
  logs.forEach(function(l){
    var k = fmtDate(l.timestamp);
    if (!g[k]) g[k] = [];
    g[k].push(l);
  });
  return g;
}
function getCustomFoods() {
  try { return JSON.parse(localStorage.getItem("customFoods")||"[]"); } catch(e) { return []; }
}
function saveCustomFood(label) {
  var foods = getCustomFoods();
  var id = label.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
  if (!foods.find(function(f){return f.id===id;}) && !FOODS.find(function(f){return f.id===id;}))
    foods.push({id:id, emoji:"🍽️", label:label});
  localStorage.setItem("customFoods", JSON.stringify(foods));
  return id;
}

// -- Render -------------------------------------------------------------------
function renderContent() {
  document.querySelectorAll(".nav-btn").forEach(function(b){
    b.classList.toggle("active", b.dataset.v===view);
  });
  var el = document.getElementById("content");
  if (!el) return;
  if      (view==="log")     el.innerHTML = renderLog();
  else if (view==="history") el.innerHTML = renderHistory();
  else if (view==="food")    el.innerHTML = focusFood ? renderFoodDetail(focusFood) : renderFoodsOverview();
  bindEvents();
}

function renderLog() {
  var counts = foodCountMap();
  var allF   = FOODS.concat(getCustomFoods());
  var cards  = allF.map(function(f){
    var c=counts[f.id]||0, reached=c>=MILESTONE, sel=selectedFoods.indexOf(f.id)>-1;
    return '<button class="food-card'+(sel?" selected":"")+(reached?" reached":"")+'" data-food="'+f.id+'" data-action="toggle-food">'
      +'<span class="food-emoji">'+f.emoji+'</span>'
      +'<span class="food-label">'+f.label+'</span>'
      +'<span class="food-chip'+(reached?" chip-done":"")+'">'+c+'/'+MILESTONE+'</span>'
      +(reached?'<span class="star-badge">⭐</span>':"")
      +'</button>';
  }).join("");

  var selSummary = selectedFoods.length > 0
    ? '<div class="selected-summary">Selected: '+selectedFoods.map(function(id){
        var f=allF.find(function(x){return x.id===id;});
        return f ? f.emoji+" "+f.label : id;
      }).join(", ")+'</div>' : "";

  return '<section class="log-section">'
    +'<h2 class="section-title">What did Florrie eat? 🍽️</h2>'
    +'<div class="meal-selector"><label>Meal time:</label><div class="meal-btns">'
    +["breakfast","lunch","dinner","snack"].map(function(m){
      return '<button class="meal-btn'+(currentMeal===m?" active":"")+'" data-meal="'+m+'">'+mealLabel(m)+'</button>';
    }).join("")+'</div></div>'
    +'<div class="foods-grid">'+cards+'</div>'
    +'<div class="custom-food-row">'
    +'<input type="text" id="custom-food-input" placeholder="Add other food…" maxlength="40">'
    +'<button id="add-custom-btn" class="pill-btn">+ Add</button></div>'
    +selSummary
    +'<button class="big-btn" id="save-meal-btn"'+(selectedFoods.length===0?" disabled":"")+'>Next: Add Notes ➡️</button>'
    +'</section>';
}

function renderHistory() {
  if (!allLogs.length)
    return '<section class="history-section"><div class="empty-state">No meals logged yet 🍼<br><small>Start by logging Florrie\'s first meal!</small></div></section>';
  var grouped = groupByDate(allLogs);
  var html = Object.keys(grouped).map(function(date){
    var byMeal = {};
    grouped[date].forEach(function(l){
      if (!byMeal[l.meal]) byMeal[l.meal]=[];
      byMeal[l.meal].push(l);
    });
    return '<div class="day-card"><div class="day-header">'+date+'</div>'
      +Object.keys(byMeal).map(function(meal){
        return '<div class="meal-group"><div class="meal-group-label">'+mealLabel(meal)+'</div>'
          +'<div class="log-items">'
          +byMeal[meal].map(function(l){
            return '<div class="log-item">'
              +'<span class="log-emoji">'+(l.emoji||"🍽️")+'</span>'
              +'<div class="log-info"><strong>'+l.label+'</strong>'
              +(l.notes?'<span class="log-note">'+l.notes+'</span>':"")+'</div>'
              +'<span class="log-time">'+fmtTime(l.timestamp)+'</span>'
              +'<div class="log-actions">'
              +'<button class="edit-btn" data-key="'+l._key+'" data-label="'+l.label+'" data-meal="'+l.meal+'" data-notes="'+(l.notes||'')+'" data-action="edit-log">✏️</button>'
              +'<button class="delete-btn" data-key="'+l._key+'" data-action="delete-log">🗑️</button>'
              +'</div>'
              +'</div>';
          }).join("")+'</div></div>';
      }).join("")+'</div>';
  }).join("");
  return '<section class="history-section"><h2 class="section-title">Meal History 📖</h2>'+html+'</section>';
}

function renderFoodsOverview() {
  var counts = foodCountMap();
  var allF   = FOODS.concat(getCustomFoods());
  var tried  = allF.filter(function(f){return (counts[f.id]||0)>0;})
                   .sort(function(a,b){return (counts[b.id]||0)-(counts[a.id]||0);});
  var untried= allF.filter(function(f){return !(counts[f.id]||0);});
  function row(f){
    var c=counts[f.id]||0, pct=Math.min(100,(c/MILESTONE)*100), reached=c>=MILESTONE;
    return '<button class="food-row-btn" data-food="'+f.id+'" data-action="open-food">'
      +'<span class="food-row-emoji">'+f.emoji+'</span>'
      +'<div class="food-row-info"><span class="food-row-label">'+f.label+(reached?" ⭐":"")+'</span>'
      +'<div class="progress-bar"><div class="progress-fill'+(reached?" fill-done":"")+'" style="width:'+pct+'%"></div></div></div>'
      +'<span class="food-row-count'+(reached?" count-done":"")+'">'+c+'/'+MILESTONE+'</span>'
      +'</button>';
  }
  return '<section class="foods-section"><h2 class="section-title">Food Tracker 🌱</h2>'
    +(tried.length?'<div class="foods-group"><div class="group-label">Tried ('+tried.length+')</div>'+tried.map(row).join("")+'</div>':"")
    +(untried.length?'<div class="foods-group"><div class="group-label">Not tried yet ('+untried.length+')</div>'+untried.map(row).join("")+'</div>':"")
    +'<button class="pill-btn export-btn" id="export-csv-btn">📊 Export to CSV (Google Sheets)</button></section>';
}

function renderFoodDetail(foodId) {
  var allF  = FOODS.concat(getCustomFoods());
  var food  = allF.find(function(f){return f.id===foodId;});
  if (!food) return "";
  var logs  = allLogs.filter(function(l){return l.food===foodId;});
  var count = logs.length, reached = count>=MILESTONE, pct = Math.min(100,(count/MILESTONE)*100);
  return '<section class="food-detail-section">'
    +'<button class="back-btn" data-action="back-to-foods">← All Foods</button>'
    +'<div class="food-hero"><span class="hero-emoji">'+food.emoji+'</span><h2>'+food.label+'</h2>'
    +(reached?'<div class="milestone-badge">🎉 Milestone reached!</div>':"")+'</div>'
    +'<div class="count-display">'
    +'<div class="count-number'+(reached?" count-done":"")+'">'+count+'</div>'
    +'<div class="count-label">times given</div><div class="count-sub">Goal: '+MILESTONE+'</div></div>'
    +'<div class="progress-bar big-progress"><div class="progress-fill'+(reached?" fill-done":"")+'" style="width:'+pct+'%"></div></div>'
    +'<div class="dot-track">'+Array.from({length:MILESTONE}).map(function(_,i){
      return '<div class="dot'+(i<count?" dot-filled":"")+'"></div>';
    }).join("")+'</div>'
    +'<h3 class="log-history-title">Log History</h3>'
    +(!logs.length?'<div class="empty-state">Not logged yet</div>':
      logs.map(function(l){
        return '<div class="log-item"><span class="log-emoji">'+mealLabel(l.meal)+'</span>'
          +'<div class="log-info"><strong>'+fmtDT(l.timestamp)+'</strong>'
          +(l.notes?'<span class="log-note">'+l.notes+'</span>':"")+'</div>'
          +'<div class="log-actions">'
          +'<button class="edit-btn" data-key="'+l._key+'" data-label="'+l.label+'" data-meal="'+l.meal+'" data-notes="'+(l.notes||'')+'" data-action="edit-log">✏️</button>'
          +'<button class="delete-btn" data-key="'+l._key+'" data-action="delete-log">🗑️</button>'
          +'</div>'
          +'</div>';
      }).join(""))
    +'</section>';
}

// -- Edit modal ---------------------------------------------------------------
function openEditModal(key, label, meal, notes) {
  // Remove any existing modal
  var existing = document.getElementById("edit-modal");
  if (existing) existing.remove();

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "edit-modal";
  overlay.innerHTML = '<div class="modal">'
    +'<h3>Edit Entry ✏️</h3>'
    +'<label>Food</label>'
    +'<input type="text" id="edit-label" value="'+label+'">'
    +'<label>Meal</label>'
    +'<select id="edit-meal">'
    +['breakfast','lunch','dinner','snack'].map(function(m){
      return '<option value="'+m+'"'+(meal===m?' selected':'')+'>'+{breakfast:'🌅 Breakfast',lunch:'☀️ Lunch',dinner:'🌙 Dinner',snack:'🍪 Snack'}[m]+'</option>';
    }).join('')
    +'</select>'
    +'<label>Notes</label>'
    +'<textarea id="edit-notes" rows="2">'+notes+'</textarea>'
    +'<div class="modal-btns">'
    +'<button class="modal-cancel" id="edit-cancel">Cancel</button>'
    +'<button class="modal-save" id="edit-save">Save Changes</button>'
    +'</div></div>';

  document.body.appendChild(overlay);

  document.getElementById("edit-cancel").addEventListener("click", function(){
    overlay.remove();
  });
  overlay.addEventListener("click", function(e){
    if (e.target===overlay) overlay.remove();
  });
  document.getElementById("edit-save").addEventListener("click", function(){
    var newLabel = document.getElementById("edit-label").value.trim();
    var newMeal  = document.getElementById("edit-meal").value;
    var newNotes = document.getElementById("edit-notes").value.trim();
    if (!newLabel) return;
    var saveBtn = document.getElementById("edit-save");
    saveBtn.disabled = true;
    saveBtn.textContent = "Saving…";
    dbPatch("/logs/"+key, {label:newLabel, meal:newMeal, notes:newNotes})
      .then(function(){
        overlay.remove();
        toast("✅ Entry updated!");
        loadLogs().then(function(){ renderContent(); });
      }).catch(function(e){
        toast("⚠️ Update failed: "+e.message, "red");
        saveBtn.disabled = false;
        saveBtn.textContent = "Save Changes";
      });
  });
}

// -- Events -------------------------------------------------------------------
function bindEvents() {
  document.querySelectorAll("[data-action='toggle-food']").forEach(function(btn){
    btn.addEventListener("click", function(){
      var id = btn.dataset.food;
      selectedFoods = selectedFoods.indexOf(id)>-1
        ? selectedFoods.filter(function(x){return x!==id;})
        : selectedFoods.concat([id]);
      renderContent();
    });
  });

  document.querySelectorAll(".meal-btn").forEach(function(btn){
    btn.addEventListener("click", function(){ currentMeal=btn.dataset.meal; renderContent(); });
  });

  // notes are now handled per-food in the modal

  var customBtn = document.getElementById("add-custom-btn");
  if (customBtn) customBtn.addEventListener("click", function(){
    var inp = document.getElementById("custom-food-input");
    var val = inp.value.trim();
    if (!val) return;
    var id = saveCustomFood(val);
    if (selectedFoods.indexOf(id)===-1) selectedFoods.push(id);
    renderContent();
  });

  var saveBtn = document.getElementById("save-meal-btn");
  if (saveBtn) saveBtn.addEventListener("click", saveMeal);

  document.querySelectorAll("[data-action='open-food']").forEach(function(btn){
    btn.addEventListener("click", function(){ focusFood=btn.dataset.food; renderContent(); });
  });

  var backBtn = document.querySelector("[data-action='back-to-foods']");
  if (backBtn) backBtn.addEventListener("click", function(){ focusFood=null; renderContent(); });

  document.querySelectorAll("[data-action='edit-log']").forEach(function(btn){
    btn.addEventListener("click", function(){
      openEditModal(
        btn.dataset.key,
        btn.dataset.label,
        btn.dataset.meal,
        btn.dataset.notes
      );
    });
  });

  document.querySelectorAll("[data-action='delete-log']").forEach(function(btn){
    btn.addEventListener("click", function(){
      if (!confirm("Delete this entry?")) return;
      var key = btn.dataset.key;
      dbDelete("/logs/"+key).then(function(){
        toast("🗑️ Deleted.");
        loadLogs().then(function(){ renderContent(); });
      }).catch(function(e){ toast("⚠️ Delete failed: "+e.message,"red"); });
    });
  });

  var csvBtn = document.getElementById("export-csv-btn");
  if (csvBtn) csvBtn.addEventListener("click", exportCSV);
}

// -- Per-food notes modal -----------------------------------------------------
function saveMeal() {
  var allF   = FOODS.concat(getCustomFoods());
  var toSave = selectedFoods.slice();
  if (!toSave.length) return;
  // Build list of {food, notes} - start with empty notes
  var entries = toSave.map(function(id){
    var food = allF.find(function(f){return f.id===id;})||{id:id,label:id,emoji:"🍽️"};
    return {food:food, notes:""};
  });
  openNotesModal(entries, 0);
}

function openNotesModal(entries, idx) {
  var existing = document.getElementById("notes-modal");
  if (existing) existing.remove();

  var entry  = entries[idx];
  var food   = entry.food;
  var total  = entries.length;
  var isLast = idx === total - 1;

  var overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "notes-modal";
  overlay.innerHTML =
    '<div class="modal">'
    +'<div class="notes-modal-header">'
    +'<span class="notes-food-emoji">'+food.emoji+'</span>'
    +'<div>'
    +'<h3>'+food.label+'</h3>'
    +'<span class="notes-step">'+( total>1 ? (idx+1)+' of '+total : 'Add notes' )+'</span>'
    +'</div>'
    +'</div>'
    +'<label style="margin-top:12px;display:block;font-size:0.82rem;font-weight:700;color:var(--muted)">Notes (optional)</label>'
    +'<textarea id="notes-input" rows="3" placeholder="e.g. loved it, refused, mild reaction…" '
    +'style="width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;'
    +'font-family:'Nunito',sans-serif;font-size:0.88rem;background:var(--surface);color:var(--text);'
    +'outline:none;margin-top:6px;resize:none;">'+entry.notes+'</textarea>'
    +'<div class="modal-btns" style="margin-top:16px">'
    +(idx>0?'<button class="modal-cancel" id="notes-back">← Back</button>':"")
    +'<button class="modal-cancel" id="notes-skip">Skip</button>'
    +'<button class="modal-save" id="notes-next">'+(isLast?'Save All 💾':'Next →')+'</button>'
    +'</div>'
    +'</div>';

  document.body.appendChild(overlay);

  var inp = document.getElementById("notes-input");
  // focus without triggering layout shift on some mobiles
  setTimeout(function(){ inp && inp.focus(); }, 100);

  function advance(notesVal) {
    entries[idx].notes = notesVal || "";
    if (isLast) {
      overlay.remove();
      doSave(entries);
    } else {
      overlay.remove();
      openNotesModal(entries, idx+1);
    }
  }

  document.getElementById("notes-next").addEventListener("click", function(){
    advance(inp.value.trim());
  });
  document.getElementById("notes-skip").addEventListener("click", function(){
    advance("");
  });
  var backBtn = document.getElementById("notes-back");
  if (backBtn) backBtn.addEventListener("click", function(){
    entries[idx].notes = inp.value.trim();
    overlay.remove();
    openNotesModal(entries, idx-1);
  });
}

function doSave(entries) {
  var counts = foodCountMap();
  var promises = entries.map(function(e){
    return dbPush("/logs", {
      food:      e.food.id,
      label:     e.food.label,
      emoji:     e.food.emoji,
      meal:      currentMeal,
      notes:     e.notes,
      timestamp: Date.now()
    });
  });
  Promise.all(promises).then(function(){
    var allF = FOODS.concat(getCustomFoods());
    var newM = entries.filter(function(e){ return (counts[e.food.id]||0)+1===MILESTONE; });
    selectedFoods = [];
    toast("✅ "+entries.length+" food"+(entries.length>1?"s":"")+" logged!");
    if (newM.length){
      setTimeout(function(){ toast("🎉 "+newM[0].food.label+" hit "+MILESTONE+" tries!","green"); },800);
    }
    loadLogs().then(function(){ renderContent(); });
  }).catch(function(e){
    toast("⚠️ Save failed: "+e.message,"red");
  });
}

// -- CSV ----------------------------------------------------------------------
function exportCSV(){
  var rows = [["Date","Time","Meal","Food","Notes"]];
  allLogs.slice().reverse().forEach(function(l){
    rows.push([fmtDate(l.timestamp),fmtTime(l.timestamp),l.meal,l.label,l.notes||""]);
  });
  var csv = rows.map(function(r){
    return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(",");
  }).join("\n");
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download = "florries-food-tracker.csv";
  a.click();
  toast("📊 CSV ready - import into Google Sheets.");
}

// -- Toast --------------------------------------------------------------------
function toast(msg, color){
  color = color||"default";
  var t = document.createElement("div");
  t.className = "toast toast-"+color;
  t.textContent = msg;
  document.getElementById("toast-container").appendChild(t);
  setTimeout(function(){ t.classList.add("show"); }, 10);
  setTimeout(function(){ t.classList.remove("show"); setTimeout(function(){ t.remove(); },400); }, 3500);
}
</script>
